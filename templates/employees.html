{% extends 'base.html' %}
{% block content %}
<section>
  <h1>Employees</h1>

  <button id="add-employee-btn">Add Employee</button>

  <div id="employee-list-wrapper">
    <table id="employees-table">
      <thead>
        <tr>
          <th>Photo</th>
          <th>Name</th>
          <th>Category</th>
          <th>Skills</th>
          <th>Store</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="employees-tbody"></tbody>
    </table>
  </div>
  <div id="status">Employees loaded on API calls</div>
</section>

<!-- Employee Add/Edit Modal -->
<div id="employee-modal" class="modal-overlay" hidden>
  <div class="modal-content" style="max-width: 500px;">
    <h2 id="employee-modal-title">Add Employee</h2>
    <form id="employee-form" novalidate>
      <input type="hidden" id="employee-form-id" />
      
      <div class="form-group">
        <label for="employee-form-name">Name</label>
        <input type="text" id="employee-form-name" placeholder="e.g. John Doe" required />
      </div>
      
      <div class="form-group">
        <label for="employee-form-username">Username</label>
        <input type="text" id="employee-form-username" placeholder="e.g. jdoe" required />
      </div>
      
      <div class="form-group">
        <label for="employee-form-email">Email</label>
        <input type="email" id="employee-form-email" placeholder="e.g. jdoe@example.com" required />
      </div>

      <div class="form-group">
        <label for="employee-form-password">Password</label>
        <input type="password" id="employee-form-password" required />
      </div>

      <div class="form-group">
        <label for="employee-form-dateOfContract">Date of Contract</label>
        <input type="date" id="employee-form-dateOfContract" required />
      </div>
      
      <div class="form-group">
        <label for="employee-form-category">Category</label>
        <select id="employee-form-category" required>
          <option value="Manager">Manager</option>
          <option value="Supervisor">Supervisor</option>
          <option value="Operator">Operator</option>
        </select>
      </div>

      <div class="form-group">
        <label for="employee-form-refStore">Store</label>
        <select id="employee-form-refStore" required>
          <option value="">Select a store...</option>
        </select>
      </div>

      <div class="form-group">
        <label>Skills</label>
        <div class="checkbox-group" style="display:flex; gap:10px; flex-wrap:wrap; margin-top:5px;">
          <label style="font-size:0.8rem;"><input type="checkbox" name="skills" value="MachineryDriving"> Mach. Driving</label>
          <label style="font-size:0.8rem;"><input type="checkbox" name="skills" value="WritingReports"> Writing Reports</label>
          <label style="font-size:0.8rem;"><input type="checkbox" name="skills" value="CustomerRelationships"> Cust. Relations</label>
        </div>
      </div>
      
      <div class="form-group">
        <label for="employee-form-image">Image URL</label>
        <input type="url" id="employee-form-image" placeholder="https://example.com/photo.jpg" required />
      </div>

      <div id="employee-form-error" class="form-error"></div>
      
      <div class="form-actions">
        <button type="button" id="employee-form-cancel">Cancel</button>
        <button type="submit" id="employee-form-submit">Save</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
