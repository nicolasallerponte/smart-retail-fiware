{% extends 'base.html' %}
{% block content %}
<div class="page-header">
  <h1 data-i18n="pages.products.title">Products</h1>
  <button id="add-product-btn" data-i18n="pages.products.add">
    <i class="fas fa-plus"></i> Add Product
  </button>
</div>

<table id="products-table">
  <thead>
    <tr>
      <th data-i18n="table.image">Image</th>
      <th data-i18n="table.name">Name</th>
      <th data-i18n="table.price">Price</th>
      <th data-i18n="table.size">Size</th>
      <th data-i18n="table.color">Color</th>
      <th data-i18n="table.actions">Actions</th>
    </tr>
  </thead>
  <tbody id="products-tbody"></tbody>
</table>
{% endblock %}

{% block modals %}
<div id="product-modal" class="modal-overlay" hidden>
  <div class="modal-content">
    <h2 id="modal-title" data-i18n="modals.add_product">Add Product</h2>
    <form id="product-form" novalidate>
      <input type="hidden" id="product-form-id" />
      <div class="form-group">
        <label for="product-form-name" data-i18n="forms.name">Name</label>
        <input type="text" id="product-form-name" placeholder="e.g. Industrial Motor" required />
      </div>
      <div class="form-group">
        <label for="product-form-price" data-i18n="forms.price">Price (€)</label>
        <input type="number" id="product-form-price" min="0" step="0.01" placeholder="0.00" required />
      </div>
      <div class="form-group">
        <label for="product-form-size" data-i18n="forms.size">Size</label>
        <select id="product-form-size" required>
          <option value="Small">Small</option>
          <option value="Medium">Medium</option>
          <option value="Large">Large</option>
          <option value="One Size">One Size</option>
        </select>
      </div>
      <div class="form-group">
        <label for="product-form-color" data-i18n="forms.color">Color</label>
        <input type="color" id="product-form-color" value="#000000" required />
      </div>
      <div class="form-group">
        <label for="product-form-image" data-i18n="forms.image_url">Image URL</label>
        <input type="url" id="product-form-image" placeholder="https://example.com/image.jpg" required />
      </div>
      <div id="product-form-error" class="form-error"></div>
      <div class="form-actions">
        <button type="button" id="product-form-cancel" data-i18n="common.cancel">Cancel</button>
        <button type="submit" id="product-form-submit" data-i18n="common.save">Save</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
