{% extends 'base.html' %}
{% block content %}
<section>
  <h1>Products</h1>
  <div id="product-list-wrapper">
    <table id="products-table">
      <thead>
        <tr>
          <th>Image</th>
          <th>Name</th>
          <th>Price</th>
          <th>Size</th>
          <th>Color</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="products-tbody"></tbody>
    </table>
  </div>
  <div id="status">Products loaded on API calls</div>
</section>
{% endblock %}
