{% extends 'base.html' %}
{% block content %}
<section>
  <h1>Products</h1>

  <button id="add-product-btn">Add Product</button>

  <div id="product-list-wrapper">
    <table id="products-table">
      <thead>
        <tr>
          <th>Image</th>
          <th>Name</th>
          <th>Price</th>
          <th>Size</th>
          <th>Color</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="products-tbody"></tbody>
    </table>
  </div>
  <div id="status">Products loaded on API calls</div>
</section>
{% endblock %}

{% block modals %}
<!-- Product Add/Edit Modal -->
<div id="product-modal" class="modal-overlay" hidden>
  <div class="modal-content">
    <h2 id="modal-title">Add Product</h2>

    <form id="product-form" novalidate>
      <!-- Hidden: entity ID — read-only, never shown to the user -->
      <input type="hidden" id="product-form-id" />

      <div class="form-group">
        <label for="product-form-name">Name</label>
        <input type="text" id="product-form-name" placeholder="e.g. Industrial Motor" required />
      </div>

      <div class="form-group">
        <label for="product-form-price">Price (€)</label>
        <input type="number" id="product-form-price" min="0" step="0.01" placeholder="0.00" required />
      </div>

      <div class="form-group">
        <label for="product-form-size">Size</label>
        <select id="product-form-size" required>
          <option value="Small">Small</option>
          <option value="Medium">Medium</option>
          <option value="Large">Large</option>
          <option value="One Size">One Size</option>
        </select>
      </div>

      <div class="form-group">
        <label for="product-form-color">Color</label>
        <input type="color" id="product-form-color" value="#000000" required />
      </div>

      <div class="form-group">
        <label for="product-form-image">Image URL</label>
        <input type="url" id="product-form-image" placeholder="https://example.com/image.jpg" required />
      </div>

      <div id="product-form-error" class="form-error"></div>

      <div class="form-actions">
        <button type="button" id="product-form-cancel">Cancel</button>
        <button type="submit" id="product-form-submit">Save</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
