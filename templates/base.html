<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title or 'Smart Retail FIWARE' }}</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css"/>
    <script defer src="/static/js/app.js"></script>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({ startOnLoad: true });
    </script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/renderers/CSS2DRenderer.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
<header class="navbar">
    <div class="navbar-left">
        <a href="/" class="nav-logo" data-i18n="nav.logo">Smart Retail FIWARE</a>
        <a href="/products" class="nav-link" data-i18n="nav.products">Products</a>
        <a href="/stores" class="nav-link" data-i18n="nav.stores">Stores</a>
        <a href="/employees" class="nav-link" data-i18n="nav.employees">Employees</a>
        <a href="/stores-map" class="nav-link" data-i18n="nav.map">Stores Map</a>
    </div>
    <div class="navbar-right">
        <label class="toggleswitch">🌙
            <input type="checkbox" id="theme-toggle" />
            <span class="slider"></span>
        </label>
        <select id="lang-selector">
            <option value="en">English</option>
            <option value="es">Español</option>
        </select>
    </div>
</header>
<main class="content">{% block content %}{% endblock %}</main>
{% block modals %}{% endblock %}
<footer class="footer" data-i18n="nav.footer">© 2026 Smart Retail FIWARE</footer>
</body>
</html>
