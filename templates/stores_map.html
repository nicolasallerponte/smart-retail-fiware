{% extends 'base.html' %}
{% block content %}
<section>
  <h1 data-i18n="pages.stores_map.title">Stores Map</h1>
  <div id="stores-map-container"></div>
</section>

<script>
  (function () {
    const COUNTRY_FALLBACK = {
      ES: [40.4168, -3.7038], FR: [48.8566, 2.3522],
      DE: [52.5200, 13.4050], IT: [45.4642, 9.1900],
      GB: [51.5074, -0.1278], PT: [38.7169, -9.1395],
      NL: [52.3676, 4.9041],  BE: [50.8503, 4.3517],
    };

    const map = L.map('stores-map-container').setView([48, 10], 4);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    function placeMarker(store, lat, lng) {
      const storeKey = store.id.split(':')[3] || store.id;
      const name    = store.name ? store.name.value : 'Unknown';
      const country = store.countryCode ? store.countryCode.value : '';
      const temp    = store.temperature ? store.temperature.value + '°C' : 'N/A';
      const hum     = store.relativeHumidity ? store.relativeHumidity.value + '%' : 'N/A';
      const img     = store.image ? store.image.value : '';
      const flagCls = country ? ' <span class="fi fi-' + country.toLowerCase() + '"></span>' : '';

      const popupHtml =
        '<div style="text-align:center;min-width:170px;font-family:sans-serif">' +
          (img ? '<img src="' + img + '" alt="' + name + '" width="150" style="border-radius:6px;margin-bottom:6px;display:block;margin-left:auto;margin-right:auto"><br>' : '') +
          '<strong style="font-size:14px">' + name + flagCls + '</strong><br>' +
          '<small style="color:#666">' + (store.address ? store.address.value : '') + '</small><br><br>' +
          '<span style="margin-right:8px">🌡 ' + temp + '</span>' +
          '<span>💧 ' + hum + '</span><br><br>' +
          '<a href="/stores/' + storeKey + '" style="background:#2d7d46;color:#fff;padding:4px 12px;border-radius:4px;text-decoration:none;font-size:12px">View Store →</a>' +
        '</div>';

      const marker = L.marker([lat, lng]).addTo(map);
      marker.bindPopup(popupHtml, { maxWidth: 200 });
      let closeTimer = null;
      marker.on('mouseover', function () {
        if (closeTimer) { clearTimeout(closeTimer); closeTimer = null; }
        marker.openPopup();
      });
      marker.on('mouseout', function () {
        closeTimer = setTimeout(function () { marker.closePopup(); }, 350);
      });
      marker.on('popupopen', function () {
        const el = marker.getPopup().getElement();
        if (!el) return;
        el.addEventListener('mouseenter', function () {
          if (closeTimer) { clearTimeout(closeTimer); closeTimer = null; }
        });
        el.addEventListener('mouseleave', function () {
          closeTimer = setTimeout(function () { marker.closePopup(); }, 350);
        });
      });
      marker.on('click', function () { window.location.href = '/stores/' + storeKey; });
    }

    async function geocodeAndPlace(store, index) {
      const address = store.address ? store.address.value : '';
      const cc = store.countryCode ? store.countryCode.value.toUpperCase() : '';
      let lat = null, lng = null;

      if (address) {
        await new Promise(resolve => setTimeout(resolve, index * 350));
        try {
          const geo = await fetch(
            'https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(address),
            { headers: { 'Accept-Language': 'en', 'User-Agent': 'SmartRetailFIWARE/1.0' } }
          ).then(r => r.json());
          if (geo && geo.length > 0) {
            lat = parseFloat(geo[0].lat);
            lng = parseFloat(geo[0].lon);
          }
        } catch (e) { console.warn('Geocoding error', e); }
      }

      if (lat === null) {
        const fallback = COUNTRY_FALLBACK[cc] || [48, 10];
        [lat, lng] = fallback;
        console.warn('Using fallback for', store.id, cc);
      }

      placeMarker(store, lat, lng);
    }

    fetch('/api/stores')
      .then(r => r.json())
      .then(stores => { stores.forEach((store, i) => geocodeAndPlace(store, i)); })
      .catch(err => { console.error('Failed to load stores:', err); });
  }());
</script>
{% endblock %}
