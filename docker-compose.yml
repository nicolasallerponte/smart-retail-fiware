version: '3.7'

services:
  mongo:
    image: mongo:4.4
    container_name: fiware-mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "rs.status()"]
      interval: 10s
      timeout: 5s
      retries: 5

  orion:
    image: fiware/orion:3.2.0
    container_name: fiware-orion
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "1026:1026"
    environment:
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - CONTEXT_BROKER_HOST=orion
      - ORION_LOG_LEVEL=INFO
    command: ["-dbhost", "mongo"]

  context-provider:
    image: fiware/tutorials.context-provider:latest
    container_name: fiware-context-provider
    depends_on:
      - orion
    environment:
      - TZ=UTC
    ports:
      - "3001:3000"

volumes:
  mongo_data:
