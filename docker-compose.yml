version: '3.8'

services:
  orion:
    image: fiware/orion:3.2.0
    ports:
      - "1026:1026"
    depends_on:
      - mongo
    environment:
      - ORION_MONGO_HOST=mongo
      - ORION_MONGO_PORT=27017
      - ORION_MONGO_DB=openiot
    command: -dbhost mongo -logLevel INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1026/version"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongo:
    image: mongo:4.4
    ports:
      - "27017:27017"
    command: --replSet rs0 --bind_ip_all
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3

  context-provider:
    image: fiware/tutorials.context-provider
    ports:
      - "3001:3000"
    depends_on:
      - orion
    environment:
      - ORION_URL=http://orion:1026