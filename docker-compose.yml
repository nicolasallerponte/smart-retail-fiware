version: '3.7'

services:
  mongo:
    image: mongo:4.4
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - fiware
    healthcheck:
      test: ["CMD", "echo", "ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  orion:
    image: fiware/orion:3.2.0
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "1026:1026"
    environment:
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - CONTEXT_BROKER_HOST=orion
      - ORION_LOG_LEVEL=INFO
    networks:
      - fiware
    command: ["-dbhost", "mongo"]

  context-provider:
    image: fiware/tutorials.context-provider:latest
    container_name: fiware-context-provider-p2
    depends_on:
      - orion
    environment:
      - TZ=UTC
    ports:
      - "3001:3000"
    networks:
      - fiware

volumes:
  mongo_data:

networks:
  fiware:
